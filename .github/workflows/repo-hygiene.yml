name: Repo hygiene

on:
  pull_request:
  push:
    branches:
      - "**"

permissions:
  contents: read

jobs:
  forbid-agent-artifacts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fail on tracked planning or agent directories
        run: |
          forbidden="$(git ls-files | grep -E '^(\.planing|\.planning|\.codex)(/|$)' || true)"
          if [ -n "$forbidden" ]; then
            echo "Forbidden tracked paths detected:"
            echo "$forbidden"
            exit 1
          fi
