services:
  mirofish:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mirofish
    depends_on:
      - neo4j
    env_file:
      - .env
    ports:
      - "5001:5001"
    restart: unless-stopped
    volumes:
      - ./uploads:/app/uploads
    environment:
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-change_this_password}
      NEO4J_DATABASE: ${NEO4J_DATABASE:-neo4j}

  neo4j:
    image: neo4j:5.26
    container_name: mirofish-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-change_this_password}
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

volumes:
  neo4j_data:
  neo4j_logs:
